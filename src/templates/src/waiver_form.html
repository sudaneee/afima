{% extends "src/partials/base.html" %}
{% block content %}
<div class="main-content mt-1">
  <div class="card">
    <div class="card-header">
      <h4>
        {% if waiver %}
          Edit Fee Waiver
        {% else %}
          Add Fee Waiver
        {% endif %}
      </h4>
    </div>

    <div class="card-body">
      <form method="POST">
        {% csrf_token %}

        <!-- Student -->
        <div class="form-group">
          <label>Student</label>
          <select name="student" class="form-control select2" required>
            <option value="">Select Student</option>
            {% for student in students %}
              <option value="{{ student.id }}"
                {% if waiver and waiver.student.id == student.id %}selected{% endif %}
              >
                {{ student }} ({{ student.admission_number }})
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Session -->
        <div class="form-group">
          <label>Session</label>
          <select name="session" class="form-control select2" required>
            <option value="">Select Session</option>
            {% for session in sessions %}
              <option value="{{ session.id }}"
                {% if waiver and waiver.session.id == session.id %}selected{% endif %}
              >
                {{ session.name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Term -->
        <div class="form-group">
          <label>Term</label>
          <select name="term" class="form-control" required>
            <option value="">Select Term</option>
            {% for term in terms %}
              <option value="{{ term.id }}"
                {% if waiver and waiver.term.id == term.id %}selected{% endif %}
              >
                {{ term.name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Waiver Percentage -->
        <div class="form-group">
          <label>Waiver Percentage</label>
          <select name="waiver_percentage" class="form-control" required>
            <option value="">Select Percentage</option>
            {% for p in percentages %}
              <option value="{{ p }}"
                {% if waiver and waiver.waiver_percentage == p %}selected{% endif %}
              >
                {{ p }}%
              </option>
            {% endfor %}
          </select>
        </div>

        {% if waiver %}
        <!-- Status -->
        <div class="form-group">
          <label>Status</label>
          <select name="status" class="form-control">
            {% for s in statuses %}
              <option value="{{ s }}"
                {% if waiver.status == s %}selected{% endif %}
              >
                {{ s|title }}
              </option>
            {% endfor %}
          </select>
        </div>
        {% endif %}

        <div class="card-footer text-right">
          <button type="submit" class="btn btn-primary">
            {% if waiver %}Update{% else %}Create{% endif %} Waiver
          </button>
          <a href="{% url 'waiver_list' %}" class="btn btn-secondary">
            Cancel
          </a>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
