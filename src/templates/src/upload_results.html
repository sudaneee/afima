{% extends "src/partials/base.html" %}
{% block content %}
<div class="main-content mt-1">
    <div class="card">
        <div class="card-header">
            <h4>Upload Results Using Excel</h4>
        </div>
        <div class="card-body">
            <!-- Download Template Section -->
            <div class="alert alert-info">
                <h5><i class="fas fa-download"></i> Download Template</h5>
                <p>First select a class to download a pre-filled template with student information.</p>
                <form method="POST" action="{% url 'download_result_template' %}" style="display: inline;">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6">
                            <select name="class_assigned" class="form-control" required>
                                <option value="">Select Class for Template</option>
                                {% for school_class in classes %}
                                <option value="{{ school_class.id }}">{{ school_class }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <button type="submit" class="btn btn-info">
                                <i class="fas fa-download"></i> Download Template
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <hr>

            <!-- Upload Results Section -->
            <h5><i class="fas fa-upload"></i> Upload Results</h5>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label>Term</label>
                    <select name="term" class="form-control" required>
                        <option value="">Select Term</option>
                        {% for term in terms %}
                        <option value="{{ term.id }}">{{ term.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Session</label>
                    <select name="session" class="form-control select2" required>
                        <option value="">Select Session</option>
                        {% for session in sessions %}
                        <option value="{{ session.id }}">{{ session.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <select name="class_assigned" class="form-control select2" required>
                        <option value="">Select Class</option>
                        {% for school_class in classes %}
                        <option value="{{ school_class.id }}">{{ school_class }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <select name="subject" class="form-control select2" required>
                        <option value="">Select Subject</option>
                        {% for subject in subjects %}
                        <option value="{{ subject.id }}">{{ subject.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Upload Excel File</label>
                    <input type="file" name="excel_file" class="form-control" accept=".xlsx, .xls" required>
                    <small class="form-text text-muted">Only .xlsx or .xls files allowed</small>
                </div>
                <button type="submit" class="btn btn-primary">Upload Results</button>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
