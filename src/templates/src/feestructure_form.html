{% extends "src/partials/base.html" %}
{% block content %}
<div class="main-content mt-1">
    <div class="card">
        <div class="card-header">
            <h4>
                {% if feestructure %}
                    Edit Fee Structure
                {% else %}
                    Add New Fee Structure
                {% endif %}
            </h4>
        </div>

        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <!-- Section -->
                <div class="form-group">
                    <label>Section</label>
                    <select name="section" class="form-control" required>
                        <option value="">Select Section</option>
                        {% for section in sections %}
                        <option value="{{ section.id }}"
                            {% if feestructure and feestructure.section.id == section.id %}
                                selected
                            {% endif %}
                        >
                            {{ section }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Session -->
                <div class="form-group">
                    <label>Academic Session</label>
                    <select name="session" class="form-control select2" required>
                        <option value="">Select Session</option>
                        {% for session in sessions %}
                        <option value="{{ session.id }}"
                            {% if feestructure and feestructure.session.id == session.id %}
                                selected
                            {% endif %}
                        >
                            {{ session.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Term Group -->
                <div class="form-group">
                    <label>Term Group</label>
                    <select name="term_group" class="form-control" required>
                        <option value="">Select Term</option>

                        {% for key, label in FeeStructure.TERM_GROUP_CHOICES %}
                        <option value="{{ key }}"
                            {% if feestructure and feestructure.term_group == key %}
                                selected
                            {% endif %}
                        >
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Student Type -->
                <div class="form-group">
                    <label>Student Type</label>
                    <select name="student_type" class="form-control" required>
                        <option value="">Select Student Type</option>
                        {% for key, label in student_type_choices %}
                        <option value="{{ key }}"
                            {% if feestructure and feestructure.student_type == key %}
                                selected
                            {% endif %}
                        >
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Transport -->
                <div class="form-group">
                    <label>Transport</label>
                    <select name="transport" class="form-control">
                        <option value="false"
                            {% if feestructure and not feestructure.transport %}
                                selected
                            {% endif %}
                        >
                            Not Included
                        </option>
                        <option value="true"
                            {% if feestructure and feestructure.transport %}
                                selected
                            {% endif %}
                        >
                            Included
                        </option>
                    </select>
                </div>

                <!-- Total Amount -->
                <div class="form-group">
                    <label>Total Fee Amount (₦)</label>
                    <input
                        type="number"
                        step="0.01"
                        name="total_amount"
                        class="form-control"
                        value="{{ feestructure.total_amount|default:'' }}"
                        required
                    >
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <textarea
                        name="description"
                        class="form-control"
                        rows="3"
                    >{{ feestructure.description|default:'' }}</textarea>
                </div>

                <div class="card-footer text-right">
                    <button class="btn btn-primary" type="submit">
                        {% if feestructure %}
                            Update
                        {% else %}
                            Add
                        {% endif %}
                        Fee Structure
                    </button>

                    <a href="{% url 'feestructure_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
