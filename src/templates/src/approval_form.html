{% extends "src/partials/base.html" %}
{% block content %}
<div class="main-content mt-1">
    <div class="card">
        <div class="card-header">
            <h4>
                {% if approval %}
                    Update Part Payment Approval
                {% else %}
                    Approve Part Payment
                {% endif %}
            </h4>
        </div>

        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>Parent Email</label>
                    <input
                        type="email"
                        name="parent_email"
                        class="form-control"
                        value="{{ approval.parent_email|default:'' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Academic Session</label>
                    <select name="session" class="form-control" required>
                        <option value="">Select Session</option>
                        {% for session in sessions %}
                        <option value="{{ session.id }}"
                            {% if approval and approval.session.id == session.id %}
                                selected
                            {% endif %}
                        >
                            {{ session.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Term</label>
                    <select name="term" class="form-control" required>
                        <option value="">Select Term</option>
                        {% for term in terms %}
                        <option value="{{ term.id }}"
                            {% if approval and approval.term.id == term.id %}
                                selected
                            {% endif %}
                        >
                            {{ term.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Approved Amount (₦)</label>
                    <input
                        type="number"
                        step="0.01"
                        name="approved_amount"
                        class="form-control"
                        value="{{ approval.approved_amount|default:'' }}"
                        required
                    >
                </div>

                {% if approval %}
                <div class="form-group">
                    <label>Status</label>
                    <select name="status" class="form-control">
                        {% for key, label in approval.STATUS_CHOICES %}
                        <option value="{{ key }}"
                            {% if approval.status == key %}selected{% endif %}
                        >
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">
                        Save
                    </button>
                    <a href="{% url 'approval_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
